stages:
  - analysis
  - test
  - build
  - test-build
  - deploy

variables:
  GIT_DEPTH: 1

.tags_win10:
  tags: ["eo", "win10", "arepytools-win"]

.tags_win10_conda:
  tags: ["eo", "win10", "conda"]

.tags_manylinux_2_28:
  tags: ["eotools_manylinux228"]

.tags_conda:
  tags: ["eo", "miniconda3", "official"]

.tags_win10_new:
  tags: ["eotools_win10"]

.tags_deploy:
  tags: ["eo", "deploy"]

# === analysis ===============================================================
# ============================================================================
check_code_compliance_ruff:
  stage: analysis
  extends:
    - .tags_manylinux_2_28
  script:
    - python3.12 -m pip install nox
    - python3.12 -m nox -s check_format

check_code_compliance_pylint:
  stage: analysis
  extends:
    - .tags_manylinux_2_28
  script:
    - python3.12 -m pip install nox
    - python3.12 -m nox -s pylint

# === test - unittest ========================================================
# ============================================================================
unittest_linux:
  stage: test
  script:
    - python3.12 -m pip install nox
    - python3.12 -m nox -s unittest -p ${PYTHON}
  parallel:
    matrix:
      - PYTHON: ["3.10", "3.11", "3.12", "3.13"]
  extends: .tags_manylinux_2_28
  needs: []
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      junit:
        - _build/unittest-report-*.xml
      coverage_report:
        coverage_format: cobertura
        path: _build/unittest-coverage-*.xml

unittest_win:
  stage: test
  script:
    - . "C:\Users\ContainerAdministrator\Documents\WindowsPowerShell\profile.ps1"
    - conda create -y -n testing python=${PYTHON}
    - conda activate testing
    - python -m pip install nox
    - python -m nox -s unittest -p ${PYTHON}
  parallel:
    matrix:
      - PYTHON: ["3.10", "3.11", "3.12", "3.13"]
  needs: []
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  extends: .tags_win10_new
  artifacts:
    reports:
      junit:
        - _build/unittest-report-*.xml
      coverage_report:
        coverage_format: cobertura
        path: _build/unittest-coverage-*.xml

