stages:
  - analysis
  - test
  - build
  - test-build
  - deploy

variables:
  GIT_DEPTH: 1

.tags_win10:
  tags: ["eo", "win10", "arepytools-win"]

.tags_win10_conda:
  tags: ["eo", "win10", "conda"]

.tags_manylinux2014:
  tags: ["manylinux2014"]

.tags_manylinux_2_28:
  tags: ["manylinux_2_28"]

.tags_conda:
  tags: ["eo", "miniconda3", "official"]

.tags_deploy:
  tags: ["eo", "deploy"]


# === analysis ===============================================================
# ============================================================================
pylint:
  stage: analysis
  extends:
    - .tags_conda
  script:
    - pip install nox
    - python -m nox -s pylint

format:
  stage: analysis
  extends:
    - .tags_conda
  script:
    - pip install nox
    - python -m nox -s format_check


# === test - unittest ========================================================
# ============================================================================
.unittest_linux:
  stage: test
  extends:
    - .tags_manylinux_2_28
  script:
    - python${PYTHON} -m pip install nox
    - python${PYTHON} -m nox -s unittest -p ${PYTHON}
  artifacts:
    reports:
      junit:
        - _build/unittest-report-*.xml

unittest_linux_py310:
  extends:
    - .unittest_linux
  variables:
    PYTHON: "3.10"

unittest_linux_py311:
  extends:
    - .unittest_linux
  variables:
    PYTHON: "3.11"

unittest_linux_py312:
  extends:
    - .unittest_linux
  variables:
    PYTHON: "3.12"

.unittest_win10:
  stage: test
  extends:
    - .tags_win10
  script:
    - python -m pip install nox
    - python -m nox -s unittest -p ${PYTHON}
  artifacts:
    reports:
      junit:
        - _build/unittest-report-*.xml

unittest_win10_py310:
  extends:
    - .unittest_win10
  variables:
    PYTHON: "3.10"

unittest_win10_py311:
  extends:
    - .unittest_win10
  variables:
    PYTHON: "3.11"

unittest_win10_py312:
  extends:
    - .unittest_win10
  variables:
    PYTHON: "3.12"

# === test - integration =====================================================
# ============================================================================
.integration_test_linux:
  stage: test
  extends:
    - .tags_manylinux_2_28
  script:
    - python${PYTHON} -m pip install -e .[test]
    - python${PYTHON} -m pip install arepyextras-test
    - python${PYTHON} -m arepyextras.test --config ./tests/integration_tests/config/linux.toml test run ./tests/integration_tests/suite

integration_test_linux_py310:
  extends:
    - .integration_test_linux
  variables:
    PYTHON: "3.10"

integration_test_linux_py311:
  extends:
    - .integration_test_linux
  variables:
    PYTHON: "3.11"

.integration_test_windows10:
  stage: test
  extends:
    - .tags_win10_conda
  script:
    - . "C:\Users\ContainerAdministrator\Documents\WindowsPowerShell\profile.ps1"
    - conda create -y -n test python=${PYTHON}
    - conda activate test
    - python -m pip install -e .[test]
    - python -m pip install arepyextras-test
    - python -m arepyextras.test --config ./tests/integration_tests/config/win10.toml test run .tests/integration_tests/suite

integration_test_windows10_py310:
  extends:
    - .integration_test_windows10
  variables:
    PYTHON: "3.10"

integration_test_windows10_py311:
  extends:
    - .integration_test_windows10
  variables:
    PYTHON: "3.11"


# === build ==================================================================
# ============================================================================
sdist:
  stage: build
  extends:
    - .tags_conda
  script:
    - pip install nox
    - python -m nox -s build_sdist
  artifacts:
    expire_in: 2 weeks
    paths:
      - dist/*.tar.gz

wheel:
  stage: build
  extends:
    - .tags_conda
  script:
    - pip install nox
    - python -m nox -s build_wheel
  artifacts:
    expire_in: 2 weeks
    paths:
      - dist/*.whl

conda_pkg:
  stage: build
  extends:
    - .tags_conda
  script:
    - pip install nox
    - conda config --add channels avalentino
    - python -m nox -s build_conda_pkg
  artifacts:
    expire_in: 2 weeks
    paths:
      - dist/*.tar.bz2

doc:
  stage: build
  extends:
    - .tags_conda
  script:
    - pip install nox
    - python -m nox -s build_doc
  artifacts:
    expire_in: 2 weeks
    paths:
      - docs/build/*.zip


# === deploy =================================================================
# ============================================================================
deploy_package:
  stage: deploy
  extends: .tags_deploy
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - eval "$(ssh-agent -s)"
    - for file in dist/*.tar.gz dist/*.whl; do
        eo_pgp-signme ${file} > ${file}.asc &&
       ./.gitlab/ci/dashboard-copy.sh ${file} develop/sct/archive &&
       ./.gitlab/ci/dashboard-copy.sh ${file}.asc develop/sct/archive;
      done
    - for file in dist/*.tar.bz2; do
        eo_pgp-signme ${file} > ${file}.asc &&
       ./.gitlab/ci/dashboard-copy.sh ${file} ${INTERNAL_CONDA_CHANNEL_PATH}/noarch &&
       ./.gitlab/ci/dashboard-copy.sh ${file}.asc ${INTERNAL_CONDA_CHANNEL_PATH}/noarch;
      done
    - ./.gitlab/ci/conda-forge-update.sh ${INTERNAL_CONDA_CHANNEL_PATH}


deploy_doc:
  stage: deploy
  extends: .tags_deploy
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$DEPLOY_DOC == "true"'
  script:
    - eval "$(ssh-agent -s)"
    - for file in docs/build/*.zip; do
        eo_pgp-signme ${file} > ${file}.asc &&
       ./.gitlab/ci/dashboard-copy.sh ${file} develop/sct/archive &&
       ./.gitlab/ci/dashboard-copy.sh ${file}.asc develop/sct/archive;
      done
