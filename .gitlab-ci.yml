# === build ==================================================================
# ============================================================================
sdist:
  stage: build
  extends:
    - .tags_manylinux_2_28
  script:
    - python3.12 -m pip install nox
    - python3.12 -m nox -s build_sdist
  artifacts:
    expire_in: 2 weeks
    paths:
      - dist/*.tar.gz

wheel:
  stage: build
  extends:
    - .tags_manylinux_2_28
  script:
    - python3.12 -m pip install nox
    - python3.12 -m nox -s build_wheel
  artifacts:
    expire_in: 2 weeks
    paths:
      - dist/*.whl

conda_pkg:
  stage: build
  extends:
    - .tags_conda
  script:
    - pip install nox
    - python -m nox -s build_conda_pkg
  needs: []
  artifacts:
    expire_in: 2 weeks
    paths:
      - dist/*.conda

doc:
  stage: build
  extends:
    - .tags_manylinux_2_28
  script:
    - yum install -y pandoc
    - python3.12 -m pip install nox
    - python3.12 -m nox -s build_doc
  needs: []
  artifacts:
    expire_in: 2 weeks
    paths:
      - docs/build/*.zip

# === deploy =================================================================
# ============================================================================
deploy_package:
  stage: deploy
  extends: .tags_deploy
  rules:
    - if: "$CI_COMMIT_TAG"
  script:
    - eval "$(ssh-agent -s)"
    - for file in dist/*.tar.gz dist/*.whl; do
      eo_pgp-signme ${file} > ${file}.asc &&
      ./.gitlab/ci/dashboard-copy.sh ${file} develop/sct/archive &&
      ./.gitlab/ci/dashboard-copy.sh ${file}.asc develop/sct/archive;
      done
    - for file in dist/*.conda; do
      eo_pgp-signme ${file} > ${file}.asc &&
      ./.gitlab/ci/dashboard-copy.sh ${file} ${INTERNAL_CONDA_CHANNEL_PATH}/noarch &&
      ./.gitlab/ci/dashboard-copy.sh ${file}.asc ${INTERNAL_CONDA_CHANNEL_PATH}/noarch;
      done
    - ./.gitlab/ci/conda-forge-update.sh ${INTERNAL_CONDA_CHANNEL_PATH}

deploy_doc:
  stage: deploy
  extends: .tags_deploy
  rules:
    - if: "$CI_COMMIT_TAG"
    - if: '$DEPLOY_DOC == "true"'
  before_script:
    - export PACKAGE_VERSION=v$(grep "__version__" sct/__init__.py | awk -F '"' '{print $2}')
  script:
    - eval "$(ssh-agent)"
    - cat "$DASHBOARD_PRIVATE_KEY" | base64 -d | ssh-add -
    - for file in docs/build/*.zip; do
      eo_pgp-signme ${file} > ${file}.asc &&
      ./.gitlab/ci/dashboard-copy.sh ${file} develop/sct/archive &&
      ./.gitlab/ci/dashboard-copy.sh ${file}.asc develop/sct/archive;
      done
    - unzip docs/build/*.zip
    - mv *-html-doc ${PACKAGE_VERSION}
    - rsync --stats -r ${PACKAGE_VERSION} sardashboard@intranet.aresys.it:develop/sct/docs
    - ssh sardashboard@intranet.aresys.it "cd develop/sct/docs && rm latest && ln -s ${PACKAGE_VERSION} latest"
