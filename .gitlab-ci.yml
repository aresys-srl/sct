stages:
  - test

variables:
  GIT_DEPTH: 1

.tags_manylinux_2_28:
  tags: ["eotools_manylinux228"]

.tags_win10_new:
  tags: ["eotools_win10"]

# === test - integration =====================================================
# ============================================================================
integration_test_linux:
  stage: test
  variables:
    SCT_TEST_DATA_ROOT: "$SCT_TEST_DATA_ROOT_LINUX"
    SCT_INTEGRATION_TESTS_REF: "$SCT_INTEGRATION_TESTS_REF_LINUX"
    SCT_PERTURB_EOF_CONFIG: "test_ed18cc99_config.toml"
  script:
    - python${PYTHON} -m venv ./ci_test
    - source ./ci_test/bin/activate
    - python -m pip install .[test,cli,graphs]
    - python -m pip install sct_aresys_reader sct_sentinel1_reader
    - sct testing test -r ./tests/integration_tests/test_registry.json -out ./test_output --cli
  parallel:
    matrix:
      - PYTHON: ["3.11", "3.12", "3.13", "3.14"]
  extends: .tags_manylinux_2_28
  needs: []

integration_test_windows:
  stage: test
  variables:
    SCT_TEST_DATA_ROOT: "$SCT_TEST_DATA_ROOT_WINDOWS"
    SCT_INTEGRATION_TESTS_REF: "$SCT_INTEGRATION_TESTS_REF_WINDOWS"
    SCT_PERTURB_EOF_CONFIG: "test_db5c50fc_config.toml"
  script:
    - . "C:\Users\ContainerAdministrator\Documents\WindowsPowerShell\profile.ps1"
    - conda create -y -n integration_test python=${PYTHON}
    - conda activate integration_test
    - python -m pip install -e .[test,cli,graphs]
    - python -m pip install sct_aresys_reader sct_sentinel1_reader
    - sct testing test -r ./tests/integration_tests/test_registry.json -out ./test_output --cli
  parallel:
    matrix:
      - PYTHON: ["3.11", "3.12", "3.13"]
  extends: .tags_win10_new
  needs: []
