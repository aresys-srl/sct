name: sct

on:
  workflow_dispatch:

  push:
    branches:
      - main
    tags:
      - "sct-v*"
      - "docs-v*"
    paths:
      - ".github/workflows/sct.yml"
      - "src/**"
      - "tests/**"
      - "docs/**"
      - "overrides/**"
      - "noxfile.py"
      - "pyproject.toml"
      - "zensical.toml"

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/sct.yml"
      - "src/**"
      - "tests/**"
      - "docs/**"
      - "overrides/**"
      - "noxfile.py"
      - "pyproject.toml"
      - "zensical.toml"

jobs:
  analysis:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    strategy:
      fail-fast: false
      matrix:
        task:
          - check_format
          - pylint

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH
      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s ${{ matrix.task }}

  unittest_linux:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Select Python ${{ matrix.python }}
        run: |
          case "${{ matrix.python }}" in
            3.11) echo "/opt/python/cp311-cp311/bin" >> $GITHUB_PATH ;;
            3.12) echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH ;;
            3.13) echo "/opt/python/cp313-cp313/bin" >> $GITHUB_PATH ;;
            3.14) echo "/opt/python/cp314-cp314/bin" >> $GITHUB_PATH ;;
          esac

      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s pytest -p ${{ matrix.python }}
      - uses: actions/upload-artifact@v5
        with:
          name: linux-test-${{ matrix.python }}
          path: _build/pytest-report-*.xml
          retention-days: 14

  unittest_windows:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s pytest -p ${{ matrix.python }}
      - uses: actions/upload-artifact@v5
        with:
          name: windows-test-${{ matrix.python }}
          path: _build/pytest-report-*.xml
          retention-days: 14

  sdist:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH
      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s build_sdist
      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 14

  wheel:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: echo "/opt/python/cp312-cp312/bin" >> $GITHUB_PATH
      - run: python --version
      - run: python -m pip install nox
      - run: python -m nox -s build_wheel
      - uses: actions/upload-artifact@v5
        with:
          name: wheel
          path: dist/*.whl
          retention-days: 14

  doc_build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install nox
      - run: python -m nox -s build_doc
      - uses: actions/upload-artifact@v5
        with:
          name: documentation-site
          path: site/
          retention-days: 14
      - uses: actions/upload-artifact@v5
        with:
          name: documentation-archive
          path: documentation*.zip
          retention-days: 14

  publish:
    needs: [analysis, unittest_linux, unittest_windows, sdist, wheel]
    if: startsWith(github.ref_name, 'sct-v')

    runs-on: ubuntu-latest

    environment: pypi-sct

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Clean dist
        run: |
          find dist -type f ! -name "*.whl" ! -name "*.tar.gz" -delete

      - name: Show artifacts
        run: |
          find dist -type f -maxdepth 2

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish_docs:
    if: startsWith(github.ref_name, 'sct-v') || startsWith(github.ref_name, 'docs-v')
    needs: doc_build

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Download docs site
        uses: actions/download-artifact@v4
        with:
          name: documentation-site
          path: site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
