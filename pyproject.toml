[project]
name = "sct"
description = "SCT (SAR Calibration Toolbox) is the Aresys Python module for SAR products quality analysis."
authors = [{ name = "Aresys S.R.L.", email = "info@aresys.it" }]
requires-python = ">= 3.10"
readme = "README.md"
license = { file = "LICENSE.txt" }
dependencies = [
    "numpy<2",
    "pandas",
    "jsonschema",
    "toml",
    "pyproj",
    "shapely",
    "h5py",
    "s1etad",
    "art",
    "appdirs",
    "arepytools >= 1.7.0",
    "arepyextras-quality >= 1.2.2",
    "arepyextras-perturbations >= 1.1",
    "arepyextras-eo_products >= 1.1.0",
    "scipy<1.14",
]
dynamic = ["version"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Operating System :: OS Independent",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Education",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
    "Topic :: Utilities",
    "Topic :: Scientific/Engineering",
    "Typing :: Typed",
]

[project.optional-dependencies]
cli = ["click", "requests"]
graphs = ["matplotlib >= 3.5", "arepyextras-quality[graphs]"]

[project.scripts]
sct = "sct.__main__:main"
sct-rosamond-data-to-csv = "sct.cli.utility_commands_cli:convert_rosamond_csv"
sct-ionospheric-maps-download = "sct.cli.utility_commands_cli:download_ionex_tec_maps"
sct-tropospheric-maps-download = "sct.cli.utility_commands_cli:download_tropospheric_vmf3_maps"

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.pdm]
distribution = true

[tool.pdm.dev-dependencies]
dev = ["nox", "black", "isort", "pylint"]
test = ["unittest-xml-reporting", "coverage", "arepyextras-test"]
doc = [
    "ipython",
    "nbsphinx",
    "sphinx",
    "sphinx-design",
    "sphinx-copybutton",
    "pydata-sphinx-theme",
]

[tool.pdm.version]
source = "file"
path = "sct/__init__.py"

[tool.pylint.master]
fail-under = 8.5
fail-on = ["unused-import"]

[tool.pylint.message_control]
disable = ["import-error", "logging-fstring-interpolation", "logging-not-lazy"]

[tool.pylint.format]
max-line-length = 120

[tool.black]
line-length = 120
target-version = ["py310", "py311", "py312"]

[tool.isort]
profile = "black"
line_length = 120

[tool.pdm.scripts]
format = "black ."
format_c = "black --check ."
sort = "isort ."
sort_c = "isort --check ."
lint = "pylint --recursive=y sct"
test = "python -m unittest discover -s ./tests -p test_*.py"
integration_tests = "python -m arepyextras.test --config {args} test run ./tests/integration_tests/suite"
integration_tests_keep = "python -m arepyextras.test --config {args} test run ./tests/integration_tests/suite --keep-working-dir"
clean_doc = "python -m sphinx -M clean docs/source {args}"
build_doc = "python -m sphinx -b html docs/source {args}"
check_format = { composite = ["sort_c", "format_c"] }
fix_format = { composite = ["sort", "format"] }
